<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Secure Voting</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    font-family: Arial;
    background: #f2f2f2;
    text-align: center;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 10px;
    width: 180px;
}

img {
    width: 100px;
    border-radius: 50%;
}

button {
    background: green;
    color: white;
    border: none;
    padding: 8px;
    cursor: pointer;
}

button:disabled {
    background: gray;
    cursor: not-allowed;
}
</style>
</head>

<body>

<h1>Voting Panel</h1>
<div class="container" id="container"></div>

<script>
// 🔥 填你的 Firebase 配置
const firebaseConfig = {
  apiKey: "AIzaSyCeugzTHy2r3kOW8C_xmork0Wy94lNzT8w",
  authDomain: "system-data-e4222.firebaseapp.com",
  databaseURL: "https://system-data-e4222-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "system-data-e4222",
  storageBucket: "system-data-e4222.firebasestorage.app",
  messagingSenderId: "1052551310862",
  appId: "1:1052551310862:web:601f1c9a5fb298c988165f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// 本地是否已投票
let hasVoted = localStorage.getItem("hasVoted");

// 默认数据
const defaultPlayers = [
    { name: "Alex Carter", votes: 0, img: "https://i.pravatar.cc/100?img=1" },
    { name: "Sophie Lee", votes: 0, img: "https://i.pravatar.cc/100?img=2" },
    { name: "Daniel Cruz", votes: 0, img: "https://i.pravatar.cc/100?img=3" },
    { name: "Mia Johnson", votes: 0, img: "https://i.pravatar.cc/100?img=4" },
    { name: "Ryan Scott", votes: 0, img: "https://i.pravatar.cc/100?img=5" }
];

// 初始化数据库
db.ref("players").once("value", snapshot => {
    if (!snapshot.exists()) {
        db.ref("players").set(defaultPlayers);
    }
});

const container = document.getElementById("container");

// 🚀 页面加载时排序一次
let initialLoad = true;
let cachedPlayers = [];

// 实时监听
db.ref("players").on("value", snapshot => {
    let players = snapshot.val();

    if (initialLoad) {
        players.sort((a, b) => b.votes - a.votes);
        cachedPlayers = players;
        initialLoad = false;
    } else {
        // 不重新排序，保持顺序
        players = cachedPlayers.map((p, i) => ({
            ...players[i]
        }));
    }

    render(players);
});

function render(players) {
    container.innerHTML = "";

    players.forEach((player, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${player.img}">
            <div><b>${player.name}</b></div>
            <div>Votes: ${player.votes}</div>
            <button onclick="vote(${index})" ${hasVoted ? "disabled" : ""}>
                ${hasVoted ? "Voted" : "+1 Vote"}
            </button>
        `;

        container.appendChild(card);
    });
}

// 投票
function vote(index) {
    if (hasVoted) return;

    const playerRef = db.ref("players/" + index + "/votes");

    playerRef.transaction(current => (current || 0) + 1);

    localStorage.setItem("hasVoted", "true");
    hasVoted = true;

    alert("Vote submitted!");
}
</script>

</body>
</html>
