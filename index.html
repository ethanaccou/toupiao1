<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Voting Panel</title>
<style>
body {
    font-family: Arial;
    background: #f0f2f5;
    text-align: center;
}

h1 {
    margin: 20px;
}

.container {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    background: white;
    padding: 15px;
    border-radius: 12px;
    width: 180px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

img {
    width: 100px;
    height: 100px;
    border-radius: 50%;
}

.name {
    font-weight: bold;
    margin: 10px 0;
}

.votes {
    font-size: 18px;
    margin: 10px 0;
}

button {
    padding: 8px 12px;
    border: none;
    background: #4CAF50;
    color: white;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #45a049;
}
</style>
</head>

<body>

<h1>Voting Panel</h1>
<div class="container" id="container"></div>

<script>
let players = JSON.parse(localStorage.getItem("players"));

if (!players) {
    players = [
        { name: "Alex Carter", votes: 0, img: "https://i.pravatar.cc/100?img=1" },
        { name: "Sophie Lee", votes: 0, img: "https://i.pravatar.cc/100?img=2" },
        { name: "Daniel Cruz", votes: 0, img: "https://i.pravatar.cc/100?img=3" },
        { name: "Mia Johnson", votes: 0, img: "https://i.pravatar.cc/100?img=4" },
        { name: "Ryan Scott", votes: 0, img: "https://i.pravatar.cc/100?img=5" }
    ];
}

const container = document.getElementById("container");

function save() {
    localStorage.setItem("players", JSON.stringify(players));
}

function render() {
    container.innerHTML = "";

    // 排序（票数高在前）
    players.sort((a, b) => b.votes - a.votes);

    players.forEach((player, index) => {
        const card = document.createElement("div");
        card.className = "card";

        card.innerHTML = `
            <img src="${player.img}">
            <div class="name">${player.name}</div>
            <div class="votes">Votes: ${player.votes}</div>
            <button onclick="vote(${index})">+1 Vote</button>
        `;

        container.appendChild(card);
    });
}

function vote(index) {
    players[index].votes++;
    save();
    render();
}

render();
</script>

</body>
</html>
